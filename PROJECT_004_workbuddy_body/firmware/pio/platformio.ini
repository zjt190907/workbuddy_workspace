; WorkBuddy Body — PlatformIO Project Configuration
; Target: ESP32-C3 SuperMini + ST7789 240x240 TFT

[env:esp32-c3-devkitm-1]
platform = espressif32@6.9.0
board = esp32-c3-devkitm-1
framework = arduino

; Serial monitor
monitor_speed = 115200
monitor_filters = direct
monitor_rts = 0
monitor_dtr = 0

; Upload
upload_speed = 921600
upload_port = COM7

; Build flags
; ESP32-C3 native USB CDC: ARDUINO_USB_MODE=0 means built-in USB (not OTG)
; ARDUINO_USB_CDC_ON_BOOT=1 makes Serial go to USB CDC instead of UART0
; CONFIG_TINYUSB_CDC_ENABLED is NOT set in default sdkconfig for C3,
; so USBCDC.h's Serial declaration is behind a dead #if guard.
; HWCDC.h only declares Serial when ARDUINO_USB_MODE=1.
; Workaround: add both ARDUINO_USB_MODE=1 AND ARDUINO_USB_CDC_ON_BOOT=1
; This gives us: extern HWCDC Serial (from HWCDC.h) + extern HardwareSerial Serial0 (from HardwareSerial.h)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

; Library dependencies (pinned versions for production stability)
lib_deps =
    adafruit/Adafruit GFX Library@1.12.6
    adafruit/Adafruit ST7735 and ST7789 Library@1.11.0
